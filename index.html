<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>かずの せつめい — どんな数か せつ明しよう！</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#ffb3c8; --pink-d:#ff8aab;
    --blue:#a8d8ea; --blue-d:#7ec3dd;
    --yellow:#ffe39a; --yellow-d:#ffd45e;
    --green:#b8e6b8; --green-d:#8fd68f;
    --purple:#d3b8e6; --purple-d:#b98fd6;
    --orange:#ffcc99; --orange-d:#ffae5e;
    --ink:#5a4a3f; --ink-soft:#8a7a6f;
    --paper:#fffdf7; --line:#5a4a3f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0; padding:0;
    font-family:"Zen Maru Gothic",sans-serif;
    background:
      radial-gradient(circle at 15% 20%, #fff0f4 0 12%, transparent 12%),
      radial-gradient(circle at 85% 15%, #eef7ff 0 14%, transparent 14%),
      radial-gradient(circle at 80% 85%, #fff8e6 0 16%, transparent 16%),
      radial-gradient(circle at 10% 90%, #eefaee 0 13%, transparent 13%),
      #fffdf7;
    color:var(--ink);
    min-height:100vh;
    padding:16px;
    line-height:1.6;
  }
  .wrap{max-width:680px; margin:0 auto;}

  /* 手書き風ボーダー共通 */
  .card{
    background:var(--paper);
    border:4px solid var(--line);
    border-radius:24px 18px 26px 16px;
    box-shadow:4px 5px 0 rgba(90,74,63,.18);
    padding:20px;
    margin-bottom:18px;
  }

  /* ヘッダー */
  header{ text-align:center; margin-bottom:8px; }
  .title{
    display:inline-block;
    background:var(--yellow);
    border:4px solid var(--line);
    border-radius:30px 22px 28px 20px;
    box-shadow:4px 5px 0 rgba(90,74,63,.18);
    padding:10px 26px;
    font-size:clamp(22px,6vw,30px);
    font-weight:900;
  }
  .title .dice{font-size:.9em;}
  .sub{ font-size:14px; color:var(--ink-soft); margin-top:8px; font-weight:500;}

  /* お題カード */
  .quest-label{
    display:inline-block;
    background:var(--green);
    border:3px solid var(--line);
    border-radius:16px 12px 14px 10px;
    padding:3px 16px; font-weight:700; font-size:15px;
    margin-bottom:14px;
  }
  .number-box{
    text-align:center;
    margin:6px 0 14px;
  }
  .big-number{
    display:inline-block;
    font-size:clamp(54px,16vw,84px);
    font-weight:900;
    color:#fff;
    -webkit-text-stroke:3px var(--line);
    text-stroke:3px var(--line);
    letter-spacing:.06em;
    padding:4px 22px;
    background:linear-gradient(180deg,var(--pink),var(--pink-d));
    border:4px solid var(--line);
    border-radius:26px 20px 24px 18px;
    box-shadow:4px 5px 0 rgba(90,74,63,.2);
    transform:rotate(-1.5deg);
  }
  .quest-text{ text-align:center; font-size:18px; font-weight:700; }

  /* ヒントの吹き出し */
  .hints{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:14px;}
  .hint{
    flex:1 1 150px;
    background:var(--blue);
    border:3px solid var(--line);
    border-radius:18px 14px 16px 12px;
    padding:8px 10px; font-size:13.5px; font-weight:500; text-align:center;
  }
  .hint b{display:block; font-size:14px; margin-bottom:2px;}
  .hints.hidden{display:none;}
  .hint-toggle{
    display:block; margin:12px auto 0;
    background:var(--orange); border:3px solid var(--line);
    border-radius:16px 12px 14px 10px;
    padding:6px 18px; font-family:inherit; font-weight:700; font-size:14px;
    cursor:pointer; box-shadow:3px 3px 0 rgba(90,74,63,.2);
  }
  .hint-toggle:active{transform:translate(2px,2px); box-shadow:1px 1px 0 rgba(90,74,63,.2);}

  /* 入力 */
  label.in-label{ display:block; font-weight:700; margin-bottom:8px; font-size:16px;}
  textarea{
    width:100%; min-height:96px;
    font-family:inherit; font-size:18px; color:var(--ink);
    border:3px dashed var(--line); border-radius:16px;
    background:#fff; padding:12px; resize:vertical;
  }
  textarea:focus{ outline:none; border-style:solid; box-shadow:0 0 0 3px var(--yellow);}

  .btn-row{ display:flex; gap:12px; margin-top:14px; flex-wrap:wrap;}
  button.main{
    flex:1 1 auto;
    font-family:inherit; font-weight:900; font-size:20px;
    background:linear-gradient(180deg,var(--green),var(--green-d));
    border:4px solid var(--line); border-radius:20px 16px 18px 14px;
    padding:14px; cursor:pointer; box-shadow:4px 5px 0 rgba(90,74,63,.2);
  }
  button.main:active{transform:translate(2px,3px); box-shadow:2px 2px 0 rgba(90,74,63,.2);}
  button.main:disabled{opacity:.55; cursor:default;}
  button.ghost{
    font-family:inherit; font-weight:700; font-size:16px;
    background:#fff; border:3px solid var(--line); border-radius:16px 12px 14px 10px;
    padding:10px 18px; cursor:pointer; box-shadow:3px 3px 0 rgba(90,74,63,.18);
  }
  button.ghost:active{transform:translate(2px,2px); box-shadow:1px 1px 0 rgba(90,74,63,.18);}

  /* 採点結果 */
  .result.hidden{display:none;}
  .result{ animation:pop .35s ease;}
  @keyframes pop{from{transform:scale(.9); opacity:0;} to{transform:scale(1); opacity:1;}}
  .stamp{
    text-align:center; font-size:clamp(34px,9vw,46px); font-weight:900;
    margin-bottom:6px;
  }
  .stamp.maru{color:var(--pink-d);}
  .stamp.good{color:var(--orange-d);}
  .stars{ text-align:center; font-size:32px; letter-spacing:6px; margin:4px 0 12px;}
  .score-box{ text-align:center; margin:2px 0 6px;}
  .score-num{
    font-size:clamp(56px,16vw,82px); font-weight:900; color:#fff;
    -webkit-text-stroke:3px var(--line); text-stroke:3px var(--line);
    letter-spacing:.04em;
  }
  .score-unit{ font-size:24px; font-weight:900; margin-left:4px;}
  .bonus{
    text-align:center; font-weight:900; font-size:18px; color:var(--pink-d);
    margin-bottom:10px; animation:pop .4s ease;
  }
  .feedback{
    background:var(--yellow); border:3px solid var(--line);
    border-radius:18px 14px 16px 12px; padding:14px 16px;
    font-size:16px; font-weight:500;
  }
  .feedback .head{font-weight:700; margin-bottom:4px;}
  .found{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; justify-content:center;}
  .chip{
    background:var(--purple); border:3px solid var(--line);
    border-radius:14px 10px 12px 9px; padding:4px 12px; font-weight:700; font-size:14px;
  }
  .chip.miss{ background:#fff; color:var(--ink-soft); border-style:dashed;}

  .loading{ text-align:center; font-weight:700; color:var(--ink-soft); padding:10px;}
  .dot{display:inline-block; animation:blink 1.2s infinite;}
  .dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,60%,100%{opacity:.25;}30%{opacity:1;}}

  .err{ color:#c0392b; font-weight:700; text-align:center;}
  footer{ text-align:center; font-size:12px; color:var(--ink-soft); margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title"><span class="dice">🎲</span> かずの せつめい <span class="dice">🎲</span></div>
    <div class="sub">「○○は どんな 数か」を 自分の ことばで せつ明しよう！</div>
  </header>

  <!-- お題 -->
  <div class="card">
    <span class="quest-label">もんだい <span id="qnum">1</span></span>
    <div class="number-box">
      <span class="big-number" id="bigNum">780</span>
    </div>
    <div class="quest-text" id="bigNumYomi">「ななひゃく はちじゅう」は どんな 数？</div>

    <button class="hint-toggle" id="hintBtn" type="button">💡 ヒントを 見る</button>
    <div class="hints hidden" id="hints"></div>
  </div>

  <!-- 入力 -->
  <div class="card">
    <label class="in-label" for="answer">✏️ あなたの せつ明</label>
    <textarea id="answer" placeholder="れい：780は 700と 80を あわせた 数です。"></textarea>
    <div class="btn-row">
      <button class="main" id="checkBtn" type="button">🔍 さいてん する！</button>
    </div>
  </div>

  <!-- 結果 -->
  <div class="card result hidden" id="result"></div>

  <!-- つぎへ -->
  <div class="btn-row" style="margin-bottom:20px;">
    <button class="ghost" id="nextBtn" type="button">➡️ つぎの もんだい</button>
    <button class="ghost" id="clearBtn" type="button">🧽 けす</button>
  </div>

  <footer>さいころ ガッチャンコ！ シリーズ ／ オフラインでは さいてんできません</footer>
</div>

<script>
// ====== もんだいデータ ======
// 教科書の3つの見方をベースに、いくつかの数で出題
const QUESTIONS = [
  {
    num:780, yomi:"ななひゃく はちじゅう",
    views:[
      "700と 80を あわせた 数",
      "800まで あと 20の 数",
      "10を 78こ あつめた 数"
    ]
  },
  {
    num:360, yomi:"さんびゃく ろくじゅう",
    views:[
      "300と 60を あわせた 数",
      "400まで あと 40の 数",
      "10を 36こ あつめた 数"
    ]
  },
];
// 3問目以降はランダム生成（百のくらい+十のくらい）
function makeRandom(){
  const h = (Math.floor(Math.random()*9)+1)*100; // 100〜900
  const t = (Math.floor(Math.random()*9)+1)*10;  // 10〜90
  const n = h+t;
  const next = h + 100;                            // つぎのきりのよい数
  const diff = next - n;                           // その差
  return {
    num:n, yomi:"",
    views:[
      `${h}と ${t}を あわせた 数`,
      `${next}まで あと ${diff}の 数`,
      `10を ${n/10}こ あつめた 数`
    ]
  };
}

let idx=0;

const $=s=>document.querySelector(s);
const bigNum=$("#bigNum"), bigYomi=$("#bigNumYomi"), qnum=$("#qnum");
const hints=$("#hints"), hintBtn=$("#hintBtn");
const answer=$("#answer"), result=$("#result");
const checkBtn=$("#checkBtn");

function loadQuestion(q){
  bigNum.textContent=q.num;
  bigYomi.textContent = q.yomi ? `「${q.yomi}」は どんな 数？` : `${q.num}は どんな 数？`;
  hints.innerHTML = q.views.map(v=>`<div class="hint">${v}</div>`).join("");
  hints.classList.add("hidden");
  hintBtn.textContent="💡 ヒントを 見る";
  answer.value="";
  result.classList.add("hidden");
  result.innerHTML="";
  answer.focus();
}

hintBtn.addEventListener("click",()=>{
  const hidden=hints.classList.toggle("hidden");
  hintBtn.textContent = hidden ? "💡 ヒントを 見る" : "🙈 ヒントを かくす";
});

$("#nextBtn").addEventListener("click",()=>{
  idx++;
  const q = idx < QUESTIONS.length ? QUESTIONS[idx] : makeRandom();
  qnum.textContent=idx+1;
  loadQuestion(q);
  window.scrollTo({top:0,behavior:"smooth"});
});

$("#clearBtn").addEventListener("click",()=>{ answer.value=""; answer.focus(); });

// ====== AI さいてん ======
checkBtn.addEventListener("click", grade);

async function grade(){
  const text=answer.value.trim();
  const num=bigNum.textContent;
  if(!text){ answer.focus(); return; }

  result.classList.remove("hidden");
  result.innerHTML=`<div class="loading">AIせんせいが よんでいます<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>`;
  checkBtn.disabled=true;
  window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});

  const prompt =
`あなたは小学2年生の算数の、やさしくほめ上手な先生です。
子どもは「${num}は どんな数か」を自分のことばで説明しました。

【子どもの説明】
${text}

【3つの見方】
「${num}」には、つぎの3つの見方があります。
A（あわせた見方）：${num}は ○○○と △△を あわせた数
B（あといくつの見方）：${num}は、つぎの きりのよい数（百のくらい）まで あと いくつ かで みた数。
   ※「差」「ひく」ということばは つかわず、「○○○まで あと △△」のような 1年生でもわかる いいかたで考えてください。
C（10のまとまりの見方）：10を ○○こ あつめた数

【100点満点の つけかた】
・1つの見方が ちゃんと書けていたら 30点くらい。
・3つとも きちんと書けていたら 100点。
・書いた見方が おしい（数が すこしちがう・ことばが たりない）ときは、その分を 少し ひく。
・もし 4つ以上（3つの見方ぜんぶ＋それ以外の正しい見方も）書けていたら、ボーナスで 100点を こえる点数（110点や120点など）をつける。
・数が ちがっても 考え方が 合っていたら ほめて、正しい数を やさしく教える。

【出力】必ず次のJSONだけを返してください。前後に文章やマークダウンは付けないこと。
{
  "score": 点数（整数。0〜120くらい。4つ以上書けたら100をこえてよい）,
  "views": ["子どもの説明に当てはまる見方だけを 日本語ラベルで。つかうラベルは 'あわせた見方' / 'あといくつの見方' / '10のまとまりの見方' の3つ。それ以外の正しい見方があれば みじかい日本語ラベルで足す"],
  "praise": "ひらがな中心の、2年生に向けたみじかいほめ言葉と、もっとよくするためのヒントを1〜2文で。「差」「ひく」ということばは つかわない。"
}`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{role:"user",content:prompt}]
      })
    });
    const data=await res.json();
    const raw=data.content.filter(c=>c.type==="text").map(c=>c.text).join("");
    const clean=raw.replace(/```json|```/g,"").trim();
    const j=JSON.parse(clean);
    showResult(j);
  }catch(e){
    result.innerHTML=`<div class="err">⚠️ いまは さいてんできませんでした。<br>もういちど ボタンを おしてね。<br>（インターネットに つながっているか かくにんしてね）</div>`;
  }finally{
    checkBtn.disabled=false;
  }
}

function showResult(j){
  let score = Number(j.score);
  if(!Number.isFinite(score)) score = 0;
  score = Math.max(0, Math.round(score));

  // 点数で見た目をかえる
  let stampClass, stampTxt;
  if(score>=100){ stampClass="maru"; stampTxt="◎ かんぺき！"; }
  else if(score>=60){ stampClass="good"; stampTxt="○ いいね！"; }
  else { stampClass="good"; stampTxt="△ もうすこし！"; }

  const bonus = score>100 ? `<div class="bonus">🎉 ボーナス！ 100点こえたよ！</div>` : "";

  const chips = (j.views&&j.views.length)
    ? j.views.map(v=>`<span class="chip">${v}</span>`).join("")
    : `<span class="chip miss">見方を 書いてみよう</span>`;

  result.innerHTML=`
    <div class="stamp ${stampClass}">${stampTxt}</div>
    <div class="score-box"><span class="score-num">${score}</span><span class="score-unit">てん</span></div>
    ${bonus}
    <div class="found">${chips}</div>
    <div class="feedback">
      <div class="head">🐰 AIせんせいから</div>
      ${ (j.praise||"よく かんがえたね！").replace(/</g,"&lt;") }
    </div>`;
  window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

// 初期化
loadQuestion(QUESTIONS[0]);
</script>
</body>
</html>
